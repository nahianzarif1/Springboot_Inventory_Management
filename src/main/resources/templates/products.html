<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
<h2>Products</h2>

<form th:action="@{/ui/products}" method="get">
    <input type="text" name="q" placeholder="Search" th:value="${q}"/>
    <button type="submit">Search</button>
</form>

<table border="1" cellspacing="0" cellpadding="6">
    <thead>
    <tr>
        <th>ID</th>
        <th>SKU</th>
        <th>Name</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Category</th>
        <th>Seller</th>
        <th sec:authorize="hasAnyRole('SELLER','ADMIN')">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${products}">
        <td th:text="${p.id}">1</td>
        <td th:text="${p.sku}">SKU</td>
        <td th:text="${p.name}">Name</td>
        <td th:text="${p.price}">0</td>
        <td th:text="${p.stockQuantity}">0</td>
        <td th:text="${p.categoryName}">-</td>
        <td th:text="${p.sellerUsername}">seller</td>
        <td sec:authorize="hasAnyRole('SELLER','ADMIN')">
            <form th:action="@{'/ui/products/' + ${p.id} + '/update'}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="text" name="name" th:value="${p.name}" placeholder="Name"/>
                <input type="number" step="0.01" name="price" th:value="${p.price}" placeholder="Price"/>
                <input type="number" name="stockQuantity" th:value="${p.stockQuantity}" placeholder="Stock"/>
                <input type="number" name="categoryId" placeholder="Category ID"/>
                <button type="submit">Update</button>
            </form>
            <form th:action="@{'/ui/products/' + ${p.id} + '/delete'}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<div sec:authorize="hasAnyRole('SELLER','ADMIN')">
    <h3>Create Product</h3>
    <form th:action="@{/ui/products}" method="post" th:object="${createForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="text" th:field="*{sku}" placeholder="SKU" required/>
        <input type="text" th:field="*{name}" placeholder="Name" required/>
        <input type="number" step="0.01" th:field="*{price}" placeholder="Price" required/>
        <input type="number" th:field="*{stockQuantity}" placeholder="Stock"/>
        <input type="number" th:field="*{categoryId}" placeholder="Category ID"/>
        <button type="submit">Create</button>
    </form>
</div>

<p><a th:href="@{/}">Home</a></p>
</body>
</html>
