<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="content">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} ?: 'Inventory Management'">Inventory Management</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="container">
    <div class="nav">
        <a class="brand" th:href="@{/}">
            <img class="logo" th:src="@{/images/logo.svg}" alt="Inventory logo"/>
            <div>
                <div class="brand-title">Inventory Management</div>
                <div style="color: var(--muted); font-size: 12px;">Simple • Secure • Fast</div>
            </div>
        </a>
        <div class="nav-links">
            <a th:href="@{/}">Dashboard</a>
            <a th:href="@{/ui/products}">Products</a>
            <a sec:authorize="hasRole('BUYER')" th:href="@{/ui/cart}">Cart</a>
            <a sec:authorize="hasRole('BUYER')" th:href="@{/ui/orders}">My Orders</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/ui/admin}">Admin</a>
            <a th:href="@{/login}" sec:authorize="!isAuthenticated()">Login</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/auth/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn" type="submit">Logout</button>
            </form>
        </div>
    </div>

    <div th:if="${message}" class="card" style="margin-top:16px; border-color: rgba(43,213,118,.35);">
        <span class="badge success"><strong>OK</strong> <span th:text="${message}">Message</span></span>
    </div>

    <div th:insert="~{::content}"></div>

    <div class="footer">
        © <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> Inventory Management • Spring Boot
    </div>
</div>
</body>
</html>
