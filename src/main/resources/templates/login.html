<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{fragments/layout :: content}">
    <div th:fragment="content">
        <div class="h1">Sign in</div>
        <p class="sub">Use one of the seeded accounts or register a buyer via the REST endpoint.</p>

        <div class="card" style="max-width:520px;">
            <form th:action="@{/login}" method="post" class="form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="input">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="admin" required/>
                </div>
                <div class="input">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••" required/>
                </div>
                <button class="btn primary" type="submit">Login</button>
            </form>

            <div style="margin-top:12px; color: var(--muted); font-size: 13px;">
                Tip: admin/admin123 • seller/seller123 • buyer/buyer123
            </div>
        </div>
    </div>
</div>
</body>
</html>
